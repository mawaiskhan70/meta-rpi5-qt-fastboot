# rpi5-fastboot.cfg
# Kernel configuration fragment for minimum boot time on RPi5
#
# This fragment is merged on top of the RPi5 base defconfig.
# Only changes from the base config are listed here.
# Format: CONFIG_NAME=y/m/n or # CONFIG_NAME is not set

# ---------------------------------------------------------------
# Console / logging — reduce boot output overhead
# ---------------------------------------------------------------
# Suppress kernel log messages during boot
# Messages still available via dmesg after boot
CONFIG_CONSOLE_LOGLEVEL_DEFAULT=3
CONFIG_MESSAGE_LOGLEVEL_DEFAULT=3

# ---------------------------------------------------------------
# Filesystems — keep only what rootfs needs
# ---------------------------------------------------------------
CONFIG_EXT4_FS=y
CONFIG_VFAT_FS=y
# FAT needed for /boot partition (RPi firmware reads FAT)
CONFIG_FAT_FS=y
CONFIG_MSDOS_FS=y

# Disable filesystems not needed on this target
# CONFIG_BTRFS_FS is not set
# CONFIG_XFS_FS is not set
# CONFIG_GFS2_FS is not set
# CONFIG_OCFS2_FS is not set
# CONFIG_CEPH_FS is not set
# CONFIG_NFS_FS is not set
# CONFIG_NFSD is not set

# ---------------------------------------------------------------
# Networking — minimal for development SSH access
# ---------------------------------------------------------------
# Keep basic networking for SSH during development
CONFIG_NET=y
CONFIG_INET=y
CONFIG_IPV6=m

# Disable unused network protocols
# CONFIG_TIPC is not set
# CONFIG_ATM is not set
# CONFIG_DECNET is not set
# CONFIG_LLC2 is not set

# ---------------------------------------------------------------
# USB — keep host support for keyboard/mouse during dev
# ---------------------------------------------------------------
CONFIG_USB=y
CONFIG_USB_XHCI_HCD=y
CONFIG_USB_HID=y

# ---------------------------------------------------------------
# Display / GPU — required for EGLFS
# ---------------------------------------------------------------
# DRM/KMS core — required for /dev/dri/card0
CONFIG_DRM=y
CONFIG_DRM_VC4=y

# Framebuffer — keep for early console
CONFIG_FB=y

# ---------------------------------------------------------------
# Sound — disabled, saves init time
# ---------------------------------------------------------------
# CONFIG_SOUND is not set
# CONFIG_SND is not set

# ---------------------------------------------------------------
# Bluetooth — disabled (handled by dtoverlay=disable-bt too)
# ---------------------------------------------------------------
# CONFIG_BT is not set

# ---------------------------------------------------------------
# Wireless — keep for development, disable in production
# ---------------------------------------------------------------
CONFIG_CFG80211=m
CONFIG_MAC80211=m
CONFIG_BRCMFMAC=m
# WiFi as module (=m) — loaded on demand, not at boot
# Change to # CONFIG_BRCMFMAC is not set for production image
